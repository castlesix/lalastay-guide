<!DOCTYPE html>
<!-- 객실 비치용 인쇄 안내판 (A5, 3개 언어 동시 표기라 토글 i18n 미사용) -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Lala Stay — QR 안내판</title>
  <style>
    :root {
      --brand-color: #b07d5c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", "PingFang SC", sans-serif;
      background: #e9e4dd;
      display: flex;
      justify-content: center;
      padding: 1rem;
    }

    .sign {
      width: 148mm;
      height: 210mm;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 9mm;
      padding: 14mm;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    .brand {
      color: var(--brand-color);
      font-size: 13mm;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand small {
      display: block;
      font-size: 5.5mm;
      font-weight: 400;
      margin-top: 2mm;
      color: #8a8178;
    }

    .qr {
      width: 78mm;
      height: 78mm;
    }

    .lines p {
      font-size: 5.2mm;
      line-height: 1.7;
      color: #3d3630;
    }

    .url {
      font-size: 3.6mm;
      color: #8a8178;
      word-break: break-all;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .sign {
        box-shadow: none;
      }

      @page {
        size: A5 portrait;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="sign">
    <h1 class="brand">Lala Stay<small>라라스테이</small></h1>
    <img class="qr" src="qr.svg" alt="객실 안내 페이지 QR 코드">
    <div class="lines">
      <p>QR을 스캔하면 이용 안내 페이지로 이동합니다.</p>
      <p>Scan the QR code to open the house guide.</p>
      <p>扫描二维码查看住宿指南。</p>
    </div>
    <p class="url">castlesix.github.io/lalastay-guide/g/v4qfqfbq/</p>
  </div>
</body>
</html>
